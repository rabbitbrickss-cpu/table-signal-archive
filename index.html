<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Table Signal · Archive</title>
<meta name="description" content="F&B 양방향 인텔리전스 매체. 한국 F&B의 글로벌 진출과 글로벌 F&B 트렌드의 한국 도착을 0~100점으로 분석합니다.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#161616; --bg2:#222; --line:#333;
    --txt:#fff; --txt2:#9a9a9a; --txt3:#6f6f6f;
    --accent:#D6FF3F;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg);color:var(--txt);font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;}
  body{min-height:100vh;display:flex;flex-direction:column;}
  .wrap{max-width:760px;margin:0 auto;padding:80px 28px 120px;flex:1;width:100%;}
  .kicker{font-size:13px;font-weight:800;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;}
  h1{margin-top:14px;font-size:clamp(34px,5vw,52px);font-weight:800;letter-spacing:-.02em;line-height:1.16;}
  .lead{margin-top:22px;font-size:18px;font-weight:600;color:var(--txt2);line-height:1.62;}
  .sep{margin:48px 0 36px;height:1px;background:var(--line);}
  h2{font-size:21px;font-weight:800;letter-spacing:-.01em;color:var(--txt);}
  .list{margin-top:22px;display:flex;flex-direction:column;gap:18px;}
  .item{background:var(--bg2);border-radius:14px;padding:24px 26px;border:1px solid #2a2a2a;}
  .item .date{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;}
  .item .title{margin-top:8px;font-size:20px;font-weight:800;line-height:1.36;}
  .item .desc{margin-top:10px;font-size:15px;font-weight:500;color:var(--txt2);line-height:1.58;}
  .item .link{margin-top:14px;display:inline-block;font-size:14px;font-weight:700;color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s;}
  .item .link:hover{border-bottom-color:var(--accent);}
  .empty{padding:36px;background:var(--bg2);border-radius:14px;font-size:15px;color:var(--txt2);text-align:center;line-height:1.6;}
  footer{margin-top:auto;padding:32px 28px;border-top:1px solid var(--line);text-align:center;font-size:13px;color:var(--txt3);}
  footer .logo{font-weight:800;letter-spacing:.22em;color:var(--txt3);}
  footer a{color:var(--txt2);text-decoration:none;}
  footer a:hover{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">F&amp;B BIDIRECTIONAL INTELLIGENCE</div>
  <h1>Table Signal<br>Archive</h1>
  <p class="lead">
    한국 F&amp;B의 글로벌 진출과 글로벌 F&amp;B 트렌드의 한국 도착을
    0~100점으로 분석하는 매체. 매주 콘텐츠 아카이브가 여기에 누적됩니다.
  </p>

  <div class="sep"></div>

  <h2>최근 콘텐츠</h2>
  <div class="list">
    <div class="empty">
      첫 콘텐츠는 2026-05-27(수) 발행 예정 —<br>
      <strong style="color:#fff;">단백질 다음은 fiber일까? · 미국 빅 푸드의 신호, 한국엔 어떻게 올까</strong>
    </div>
  </div>
</div>

<footer>
  <div class="logo">TABLE SIGNAL</div>
  <div style="margin-top:8px;">
    Instagram <a href="https://instagram.com/rabbitbricks" target="_blank" rel="noopener">@rabbitbricks</a>
  </div>
</footer>
</body>
</html>
